# STM32C562RET6 with ST-LINK/V3 over SWD.

source [find interface/stlink-dap.cfg]
transport select dapdirect_swd
adapter speed 4000

set CHIPNAME stm32c5
set INTERNAL_FLASH_LOADERS {
    "C:/Program Files/STMicroelectronics/STM32CubeIDE_2.1.1/STM32CubeIDE/plugins/com.st.stm32cube.ide.mcu.externaltools.cubeprogrammer.win32_2.2.400.202601091506/tools/bin/FlashLoader/0x44E.stldr"
}
source [find target/stm32c5x.cfg]
